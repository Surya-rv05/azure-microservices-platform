# =============================================
# API Gateway — Deployment & Service
# Author: Surya
# Description: Kubernetes manifest for api-gateway
#              microservice with LoadBalancer
# =============================================

# ----- DEPLOYMENT -----
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: acrmicroservicesdev17e706.azurecr.io/api-gateway:v1
          ports:
            - containerPort: 5000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:5002"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ----- SERVICE (LoadBalancer) -----
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP